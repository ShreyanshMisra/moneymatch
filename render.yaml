# Render blueprint (10-phase-7 §4). Declares one web service (api + in-process
# settlement worker) + a managed Postgres. The web app deploys on Vercel
# (apps/web/vercel.json). The worker runs inside the api process by default
# (RUN_WORKER_IN_PROCESS=true) because Render's free tier has no Background Worker
# instance type; a standalone `type: worker` is commented below for paid tiers.
#
# Migrations run at api startup, never at import time: the api's dockerCommand
# runs `alembic upgrade head` before uvicorn binds. (Render's preDeployCommand is
# a paid feature; folding it into the start command keeps free-tier deploys
# migrating. `alembic upgrade head` is idempotent and the free tier runs a single
# instance, so there's no multi-instance migration race.) The in-process worker
# loop starts only after uvicorn boots the app — i.e. after migrations apply.
# Roll back by redeploying the previous image from the dashboard (docs/runbook.md).
#
# Set the sync:false secrets in the dashboard (or an env group named
# `moneymatch-shared`): DATABASE_URL is wired from the managed DB below;
# SUPABASE_*, FACEIT_API_KEY, SENTRY_DSN, POSTHOG_API_KEY are per-environment.

databases:
  - name: moneymatch-postgres
    plan: standard # PITR-capable plan; Neon is the alternative per the stack doc
    postgresMajorVersion: '16'

services:
  - type: web
    name: moneymatch-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    plan: starter
    # alembic is on PATH (installed system-wide in the image); uv run would
    # spin up a separate venv and fail. $PORT is Render's dynamic port. Migrate
    # then serve — if the migration fails the process exits and the deploy fails,
    # so we never serve against a stale schema. `sh -c` is required: Render execs
    # the command directly, so `&&` needs a shell to chain (and expand $PORT).
    dockerCommand: sh -c "alembic upgrade head && uvicorn moneymatch_api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ENV
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: moneymatch-postgres
          property: connectionString
      # Run the settlement worker loop *inside* this web service (a background
      # asyncio task on startup) so no separate Background Worker is needed —
      # Render's free tier has no free worker instance type. Safe on one instance
      # (and on N: FOR UPDATE SKIP LOCKED + idempotent transitions prevent double-
      # settle). To split the worker back out for scale, set this to false and add
      # the standalone `type: worker` service shown below.
      - key: RUN_WORKER_IN_PROCESS
        value: "true"
      - key: RELEASE
        value: "" # Render injects the deploy commit SHA via $RENDER_GIT_COMMIT at runtime
      - fromGroup: moneymatch-shared

  # Optional standalone worker — only for paid tiers that want the loop isolated
  # from the API. If you enable this, set RUN_WORKER_IN_PROCESS=false on the api
  # service above so the loop doesn't run in both places. It is NOT a web service:
  # it binds no port (Render would time out a web service that never opens a port).
  # - type: worker
  #   name: moneymatch-worker
  #   runtime: docker
  #   dockerfilePath: apps/api/Dockerfile
  #   dockerContext: .
  #   plan: starter
  #   dockerCommand: python -m moneymatch_api.workers.settlement_worker
  #   envVars:
  #     - key: ENV
  #       value: prod
  #     - key: DATABASE_URL
  #       fromDatabase:
  #         name: moneymatch-postgres
  #         property: connectionString
  #     - fromGroup: moneymatch-shared
